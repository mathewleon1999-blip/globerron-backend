<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reset Password</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    :root{
      --lp-bg: #0b0b0c;
      --lp-card: rgba(255,255,255,0.06);
      --lp-border: rgba(255,255,255,0.14);
      --lp-text: rgba(255,255,255,0.92);
      --lp-muted: rgba(255,255,255,0.65);
      --lp-accent: #ffffff;
      --lp-shadow: 0 22px 70px rgba(0,0,0,0.50);
    }

    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
      background:
        radial-gradient(900px 450px at 10% 10%, rgba(255,255,255,0.12), transparent 60%),
        radial-gradient(900px 450px at 90% 20%, rgba(255,255,255,0.10), transparent 55%),
        radial-gradient(700px 380px at 30% 95%, rgba(255,255,255,0.08), transparent 60%),
        linear-gradient(180deg, #0b0b0c 0%, #0f1012 100%);
      color: var(--lp-text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    .card{
      width: min(420px, 100%);
      background: var(--lp-card);
      border: 1px solid var(--lp-border);
      border-radius: 14px;
      box-shadow: var(--lp-shadow);
      backdrop-filter: blur(10px);
      padding: 22px 18px 18px;
    }

    .logo{
      width: 190px;
      height: 56px;
      margin: 0 auto 10px;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .logo img{ max-height: 50px; max-width: 100%; object-fit: contain; }

    h1{ font-size: 18px; margin: 6px 0 4px; text-align:center; }
    .sub{ font-size: 13px; color: var(--lp-muted); margin: 0 0 14px; text-align:center; }

    label{ display:block; font-size: 13px; color: var(--lp-muted); margin: 12px 0 6px; }
    input{
      width:100%;
      padding: 12px 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(0,0,0,0.22);
      color: var(--lp-text);
      font-size: 15px;
      outline: none;
    }
    input:focus{ border-color: rgba(255,255,255,0.45); box-shadow: 0 0 0 4px rgba(255,255,255,0.08); }

    .btn{
      width:100%;
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.18);
      background: #ffffff;
      color:#000;
      font-weight: 700;
      cursor:pointer;
    }
    .btn:hover{ filter: brightness(0.95); }

    .row{ display:flex; justify-content:space-between; gap:10px; margin-top: 12px; }
    .link{ color: rgba(255,255,255,0.86); font-size: 13px; text-decoration: none; }
    .link:hover{ text-decoration: underline; }

    .msg{ margin-top: 12px; font-size: 13px; color: var(--lp-muted); }
    .msg.error{ color: #ffb4b4; }
    .msg.ok{ color: #b7ffcc; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"><img src="/images/jdz-logo.jpeg" alt="JIEDIZHEN logo" /></div>
    <h1>Reset password</h1>
    <p class="sub">Choose a new password for your account.</p>

    <form id="reset-form">
      <label for="newPassword">New password</label>
      <input id="newPassword" type="password" placeholder="New password" autocomplete="new-password" />

      <label for="confirmPassword">Confirm new password</label>
      <input id="confirmPassword" type="password" placeholder="Confirm password" autocomplete="new-password" />

      <button class="btn" type="submit">Update password</button>
    </form>

    <div id="msg" class="msg"></div>

    <div class="row">
      <a class="link" href="/login.html">Back to login</a>
      <a class="link" href="/register.html">Create account</a>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search)
    const token = params.get('token') || ''
    const email = params.get('email') || ''

    const msgEl = document.getElementById('msg')

    function setMsg(text, kind){
      msgEl.textContent = text || ''
      msgEl.className = 'msg' + (kind ? (' ' + kind) : '')
    }

    document.getElementById('reset-form').addEventListener('submit', async (e)=>{
      e.preventDefault()
      const newPassword = document.getElementById('newPassword').value
      const confirmPassword = document.getElementById('confirmPassword').value

      setMsg('', '')

      if(!email || !token){
        setMsg('This reset link is invalid. Please request a new one.', 'error')
        return
      }
      if(!newPassword || newPassword.length < 6){
        setMsg('Password must be at least 6 characters.', 'error')
        return
      }
      if(newPassword !== confirmPassword){
        setMsg('Passwords do not match.', 'error')
        return
      }

      try{
        const res = await fetch('/api/auth/reset-password',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ email, token, newPassword })
        })

        if(res.ok){
          setMsg('Password updated. Redirecting to login…', 'ok')
          setTimeout(()=> location.href = '/login.html', 900)
        } else {
          const data = await res.json().catch(()=>({}))
          setMsg(data.error || 'Reset failed. Please request a new link.', 'error')
        }
      }catch(err){
        setMsg('Network error. Try again.', 'error')
      }
    })
  </script>
</body>
</html>
