<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .login-box { background: #ffffff; padding: 36px 30px 32px; width: 360px; border-radius: 10px; box-shadow: 0 12px 28px rgba(0,0,0,0.12); text-align: center; }
    .logo-slot { width: 180px; height: 60px; margin: 0 auto 14px; display: flex; align-items: center; justify-content: center; }
    .logo-slot img { max-height: 48px; max-width: 100%; object-fit: contain; }
    .brand-sub { font-size: 13px; color: #666; margin-bottom: 18px; }
    .divider { height: 2px; width: 40px; background: #000; margin: 0 auto 22px; border-radius: 2px; }
    h2 { margin-bottom: 18px; font-size: 18px; font-weight: 600; }
    input { width: 100%; padding: 11px; margin-bottom: 14px; font-size: 15px; border-radius: 6px; border: 1px solid #ddd; }
    input:focus { outline: none; border-color: #000; }
    button { width: 100%; padding: 11px; font-size: 15px; background: #000; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
    button:hover { background: #333; }
    .error { color: red; margin-top: 12px; font-size: 14px; }
    .footer-note { margin-top: 22px; font-size: 12px; color: #888; }
    .back-link { display:block; margin-top:12px; font-size:13px; }
  </style>
</head>
<body>

  <div class="login-box">
    <div class="logo-slot">
      <img src="/images/jdz-logo.jpeg" alt="JIEDIZHEN logo">
    </div>

    <div class="brand-sub">Admin Portal</div>
    <div class="divider"></div>

    <h2>Admin Login</h2>

    <form id="admin-login-form">
      <input type="email" id="email" placeholder="Admin email" autocomplete="username">
      <input type="password" id="password" placeholder="Password" autocomplete="current-password">

      <div id="otp-wrap" style="display:none; margin-top:8px;">
        <input type="text" id="otp" placeholder="Enter 6-digit OTP" inputmode="numeric" autocomplete="one-time-code">
      </div>

      <button id="login" type="submit">Login</button>
    </form>

    <div id="error" class="error"></div>

    <a class="back-link" href="/">← Back to site</a>

    <div class="footer-note">Authorized staff only</div>
  </div>

  <script src="/admin-login.js"></script>
</body>
</html>
